<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f7d8e2">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/style.css?v=4">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<main class="app">
    <section id="welcome-screen" class="welcome screen">
        <div class="logo-sun">☀</div>
        <p class="kicker">Уютная история</p>
        <h1>День Марины</h1>
        <p class="lead">Помоги Марине начать день с заботы, тепла и хорошего настроения.</p>
        <div class="day-path"><span>Утро</span><b></b><span>День</span><b></b><span>Вечер</span></div>
        <button id="start-button" class="start-button" type="button">Начать день</button>
        <p id="welcome-status" class="hint">Первый день уже готов начаться.</p>
    </section>

    <section id="game-screen" class="game screen hidden">
        <header class="topbar">
            <div><small>ДЕНЬ 1</small><h2>Доброе утро</h2></div>
            <div class="clock"><span>☀</span><strong>08:00</strong></div>
        </header>

        <section class="stats" aria-label="Состояние Марины">
            <article class="stat"><div><span>❤</span><label>Любовь</label><strong id="love-value">70</strong></div><div class="track"><i id="love-bar"></i></div></article>
            <article class="stat"><div><span>☺</span><label>Настроение</label><strong id="mood-value">62</strong></div><div class="track"><i id="mood-bar"></i></div></article>
            <article class="stat"><div><span>⚡</span><label>Энергия</label><strong id="energy-value">45</strong></div><div class="track"><i id="energy-bar"></i></div></article>
            <article class="stat"><div><span>●</span><label>Сытость</label><strong id="hunger-value">38</strong></div><div class="track"><i id="hunger-bar"></i></div></article>
            <article class="stat wide"><div><span>◇</span><label>Спокойствие</label><strong id="calm-value">58</strong></div><div class="track"><i id="calm-bar"></i></div></article>
        </section>

        <section class="room">
            <div class="wall-light"></div>
            <div class="window"><div class="sky"><i></i><span></span></div></div>
            <div class="picture"><span>♥</span></div>
            <div class="shelf"><i></i><b></b></div>
            <div class="bed"><div class="pillow"></div><div class="blanket"></div></div>
            <div class="plant"><i></i><i></i><i></i><b></b></div>
            <div class="rug"></div>
            <div id="speech" class="speech">Доброе утро… Я ещё немного сонная.</div>
            <div id="marina" class="character" aria-label="Марина">
                <div class="hair-back"></div><div class="head"><i class="eye left"></i><i class="eye right"></i><b class="smile"></b></div><div class="hair-front"></div><div class="body"></div><div class="legs"></div>
            </div>
        </section>

        <nav class="actions" aria-label="Действия">
            <button class="action-button" data-action="coffee"><b>☕</b><span>Кофе</span></button>
            <button class="action-button" data-action="breakfast"><b>🥞</b><span>Завтрак</span></button>
            <button class="action-button" data-action="sleep"><b>😴</b><span>Поспать</span></button>
            <button class="action-button" data-action="message"><b>💌</b><span>Слова</span></button>
        </nav>
        <p id="game-status" class="game-status">Выбери первое утреннее действие.</p>
    </section>
</main>
<script src="/static/app.js?v=4" defer></script>
</body>
</html>
