<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f6d6df">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <main class="game-shell">
        <section class="welcome-card" aria-labelledby="game-title">
            <div class="sun" aria-hidden="true">☀️</div>
            <p class="eyebrow">Уютная история в Telegram</p>
            <h1 id="game-title">День Марины</h1>
            <p class="subtitle">
                Помоги Марине прожить добрый день, сохранить настроение,
                отдохнуть и почувствовать заботу.
            </p>

            <div class="preview" aria-hidden="true">
                <span>🌅</span>
                <span>☕</span>
                <span>💬</span>
                <span>🌙</span>
            </div>

            <button id="start-button" class="start-button" type="button">
                Начать день
            </button>

            <p id="status" class="status" aria-live="polite">
                Первый день уже готов начаться.
            </p>
        </section>
    </main>

    <script src="{{ url_for('static', path='/app.js') }}" defer></script>
</body>
</html>
